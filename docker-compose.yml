services:
  # --- Application PHP-FPM (Laravel) ---
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: classement-entreprise-app
    container_name: classement_app
    restart: unless-stopped
    working_dir: /var/www
    env_file:
      - .env
    volumes:
      - ./:/var/www
    depends_on:
      db:
        condition: service_healthy
    networks:
      - classement

  # --- Planificateur (task scheduler Laravel) ---
  # Réutilise l'image applicative. On court-circuite l'entrypoint (pas de migrate
  # ici, l'app s'en charge) pour lancer directement `schedule:work`, qui exécute
  # le scheduler toutes les minutes → déclenche classement:recalculer à 03:00.
  scheduler:
    image: classement-entreprise-app
    container_name: classement_scheduler
    restart: unless-stopped
    working_dir: /var/www
    env_file:
      - .env
    volumes:
      - ./:/var/www
    entrypoint: ["php", "artisan", "schedule:work"]
    depends_on:
      db:
        condition: service_healthy
      app:
        condition: service_started
    networks:
      - classement

  # --- Serveur web Nginx ---
  web:
    image: nginx:1.27-alpine
    container_name: classement_web
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - classement

  # --- Base de données MySQL ---
  db:
    image: mysql:8.0
    container_name: classement_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: "${DB_DATABASE:-classement_entreprise}"
      MYSQL_USER: "${DB_USERNAME:-classement}"
      MYSQL_PASSWORD: "${DB_PASSWORD:-secret}"
      MYSQL_ROOT_PASSWORD: "${DB_ROOT_PASSWORD:-root}"
    ports:
      # Exposé sur 3307 côté hôte pour éviter un conflit avec un MySQL local.
      - "${DB_FORWARD_PORT:-3307}:3306"
    volumes:
      - dbdata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_ROOT_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - classement

  # --- Node / Vite (dev, activé via le profil "dev") ---
  node:
    image: node:20-alpine
    container_name: classement_node
    working_dir: /var/www
    volumes:
      - ./:/var/www
    ports:
      - "${VITE_PORT:-5173}:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    profiles:
      - dev
    networks:
      - classement

volumes:
  dbdata:

networks:
  classement:
    driver: bridge
